name: 법령 데이터 주간 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 법제처 API 데이터 수집
        env:
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}
        run: python3 fetch_data.py

      - name: 커밋 & 푸시
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase origin main
          git add data.json
          git diff --staged --quiet || git commit -m "법령 업데이트: $(date '+%Y-%m-%d')"
          git push
