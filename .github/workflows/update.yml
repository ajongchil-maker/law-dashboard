name: 법령 데이터 주간 업데이트

on:
  schedule:
    - cron: '0 0 * * 1'   # 매주 월요일 00:00 UTC = 09:00 KST
  workflow_dispatch:       # Actions 탭에서 수동 실행 가능

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 법제처 API 데이터 수집
        env:
          LAW_API_KEY: ${{ secrets.LAW_API_KEY }}   # Secrets에서 안전하게 주입
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import urllib.parse
          import json
          import datetime
          import os

          OC = os.environ['LAW_API_KEY']            # 환경변수에서 읽음 (코드에 노출 없음)
          KEYWORDS = ['어린이제품', '화장품', '위생용품', '원산지']
          result = {}

          for kw in KEYWORDS:
              url = (
                  'https://www.law.go.kr/DRF/lawSearch.do'
                  f'?OC={OC}'
                  f'&target=law'
                  f'&query={urllib.parse.quote(kw)}'
                  '&type=JSON'
                  '&display=30'
                  '&page=1'
                  '&sort=date'
              )
              req = urllib.request.Request(
                  url,
                  headers={'User-Agent': 'Mozilla/5.0 (compatible; LawBot/1.0)'}
              )
              try:
                  with urllib.request.urlopen(req, timeout=20) as res:
                      data = json.loads(res.read().decode('utf-8'))
                  laws = data.get('LawSearch', {}).get('law', [])
                  if isinstance(laws, dict):
                      laws = [laws]
                  result[kw] = laws
                  print(f'[{kw}] {len(laws)}건 수집 완료')
              except Exception as e:
                  print(f'[{kw}] 오류: {e}')
                  result[kw] = []

          kst = datetime.timezone(datetime.timedelta(hours=9))
          result['updated'] = datetime.datetime.now(kst).strftime('%Y-%m-%d %H:%M KST')
          result['total'] = sum(len(v) for k, v in result.items() if k not in ('updated', 'total'))

          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(result, f, ensure_ascii=False, indent=2)

          print(f'\n업데이트 완료: {result["updated"]}  총 {result["total"]}건')
          PYEOF

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          git diff --staged --quiet \
            || git commit -m "법령 데이터 업데이트: $(date '+%Y-%m-%d')"
          git push
